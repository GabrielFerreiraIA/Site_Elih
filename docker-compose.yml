# ──────────────────────────────────────────────────────────────────────────────
# Elih Seguros — docker-compose.yml
#
# Uso local (testa a imagem de produção):
#   docker compose up --build
#
# EasyPanel:
#   Importe este arquivo no EasyPanel ou use o Dockerfile diretamente.
#   Configure as variáveis de ambiente no painel do EasyPanel (não commite .env com segredos).
# ──────────────────────────────────────────────────────────────────────────────

services:
  elih-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elih-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Preencha via arquivo .env ou variáveis do EasyPanel:
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
